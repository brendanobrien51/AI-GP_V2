# ============================================================
# AI-GP V2 — Master Race Configuration
# Ganymede Systems | Anduril AI Grand Prix
# ============================================================

# --- Drone Physical Parameters ---
drone:
  mass_kg: 2.5                    # Neros Archer-class nominal mass
  dimensions_cm: [30, 30, 15]     # L x W x H bounding box
  motor_max_thrust_n: 12.0        # Per-motor max thrust
  motor_time_constant_s: 0.02     # ESC+motor response time
  linear_drag_coeff: 0.3          # Aerodynamic drag coefficient
  quadratic_drag_coeff: 0.05      # High-G drag coefficient (v^2 term)

# --- Gate Geometry ---
gate:
  width_m: 1.5                    # Gate opening width
  height_m: 1.5                   # Gate opening height
  thickness_m: 0.1                # Gate frame thickness
  num_gates: 5                    # Default gate count per track

# --- Track Generation ---
track:
  default_type: "zigzag"          # zigzag | split_s | circular
  min_gate_separation_m: 5.0      # Minimum distance between gates
  max_gate_separation_m: 20.0     # Maximum distance between gates
  altitude_range_m: [1.0, 5.0]    # Gate altitude range (above ground)
  heading_variation_deg: 60.0     # Max heading change between gates

# --- Control Interface (CTBR) ---
control:
  max_collective_thrust_ms2: 19.62  # 2 * g (2:1 thrust-to-weight)
  max_body_rate_rads: 6.0           # Max roll/pitch/yaw rate
  control_frequency_hz: 100         # Policy output rate

# --- Perception ---
perception:
  camera_resolution: [4000, 3000]  # 12MP physical camera
  camera_fov_h_deg: 120.0          # Wide-angle FPV lens
  detection_confidence: 0.30       # YOLOv8 gate detection threshold
  pnp_gate_half_size_m: 0.75       # Gate half-width for PnP solve

# --- Safety Limits ---
safety:
  max_speed_ms: 25.0               # Hard speed limit
  max_altitude_m: 15.0             # Ceiling
  min_altitude_m: 0.3              # Floor
  geofence_radius_m: 100.0         # Horizontal limit from origin
  kill_switch_timeout_s: 0.5       # Max time without valid state
